<ion-tabs (ionTabsDidChange)="setCurrentTab($event.tab)">
  <!-- TAB BAR -->
  <ion-tab-bar slot="bottom" class="custom-tab-bar">
    <ion-tab-button tab="tab1" href="/tabs/tab1">
      <ion-icon name="heart-outline"></ion-icon>
    </ion-tab-button>

    <ion-tab-button tab="tab2" href="/tabs/tab2">
      <ion-icon name="pulse-outline"></ion-icon>
    </ion-tab-button>

    <ion-tab-button tab="tab3" href="/tabs/tab3">
      <ion-icon name="book-outline"></ion-icon>
    </ion-tab-button>
  </ion-tab-bar>

  <!-- FAB central (pata) -->
  <button
    class="fab-center"
    [class.active]="selectedTab === 'tab2'"
    (click)="goHome()"
    aria-label="Inicio"
  >
    <ion-icon name="paw"></ion-icon>
  </button>

  <!-- Botón de tema: sol / luna -->
  <button
    class="theme-toggle-fab"
    (click)="toggleTheme()"
    [attr.aria-label]="themeService.isDark ? 'Activar modo claro' : 'Activar modo oscuro'"
  >
    <span class="toggle-track" [class.dark]="themeService.isDark">
      <ion-icon
        class="toggle-icon sun"
        name="sunny"
        [class.visible]="themeService.isDark"
      ></ion-icon>
      <ion-icon
        class="toggle-icon moon"
        name="moon"
        [class.visible]="!themeService.isDark"
      ></ion-icon>
    </span>
  </button>
</ion-tabs>
