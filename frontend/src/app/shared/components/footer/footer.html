<footer class="app-footer">
  <div class="footer-container">
    <div class="footer-top">
      <div class="footer-brand">
        <span class="brand-name">CityVet</span>
        <p class="brand-tag">Veterinaria · Chincha Alta, Perú</p>
      </div>

      <div class="footer-info">
        <div class="info-row">
          <ion-icon name="location-outline"></ion-icon>
          <span>{{ address }}</span>
        </div>
        <a class="info-row info-link" [href]="phoneHref">
          <ion-icon name="call-outline"></ion-icon>
          <span>{{ phone }}</span>
        </a>
        <a class="info-row info-link" [href]="directionsUrl" target="_blank" rel="noopener">
          <ion-icon name="navigate-outline"></ion-icon>
          <span>Cómo llegar</span>
        </a>
      </div>
    </div>

    <div class="footer-map">
      <iframe
        [src]="mapUrl"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Ubicación de CityVet en el mapa"
      ></iframe>
    </div>
  </div>

  <div class="footer-bottom">
    <span>&copy; {{ year }} CityVet. Todos los derechos reservados.</span>
  </div>
</footer>
