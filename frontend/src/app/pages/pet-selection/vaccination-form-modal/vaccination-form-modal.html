<div class="modal-container">
  <div class="modal-header">
    <h2>Registrar vacuna</h2>
    <button class="close-btn" (click)="cancel()">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <div class="modal-body">
    <div class="form-group">
      <label class="form-label">Vacuna</label>
      <ion-select
        class="form-select"
        interface="action-sheet"
        placeholder="Selecciona una opción"
        [(ngModel)]="selectedOption"
        cancelText="Cancelar"
        >
        @for (entry of schedule; track entry.nombre) {
          <ion-select-option [value]="entry.nombre">{{ entry.nombre }}</ion-select-option>
        }
        <ion-select-option [value]="customOptionValue">Otra (escribir nombre)</ion-select-option>
      </ion-select>
    </div>

    @if (isCustom) {
      <div class="form-group">
        <label class="form-label">Nombre de la vacuna</label>
        <input type="text" class="form-input" [(ngModel)]="customNombre" placeholder="Ej. Bordetella" />
      </div>
    }

    <div class="form-group">
      <label class="form-label">Fecha de aplicación</label>
      <input type="date" class="form-input" [(ngModel)]="fechaAplicacion" />
    </div>

    <div class="form-group">
      <label class="form-label">Notas (opcional)</label>
      <input type="text" class="form-input" [(ngModel)]="notas" placeholder="Ej. Aplicada en CityVet" />
    </div>

    @if (error) {
      <p class="form-msg form-msg--error">{{ error }}</p>
    }
  </div>

  <div class="modal-footer">
    <button class="cancel-btn" (click)="cancel()">Cancelar</button>
    <button class="confirm-btn" (click)="confirm()">
      <ion-icon name="checkmark-outline"></ion-icon>
      <span>Guardar</span>
    </button>
  </div>
</div>
