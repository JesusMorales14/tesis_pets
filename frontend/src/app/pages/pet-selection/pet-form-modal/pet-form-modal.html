<div class="modal-container">
  <div class="modal-header">
    <h2>{{ isEditMode ? 'Editar mascota' : 'Agregar mascota' }}</h2>
    <button class="close-btn" (click)="cancel()">
      <ion-icon name="close-outline"></ion-icon>
    </button>
  </div>

  <div class="modal-body">
    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-input" [(ngModel)]="nombre" placeholder="Ej. Firulais" />
    </div>

    <div class="form-group">
      <label class="form-label">Especie</label>
      <div class="segment">
        <button
          class="segment-btn"
          [class.active]="especie === 'perro'"
          (click)="especie = 'perro'"
          >
          <ion-icon name="paw-outline"></ion-icon>
          Perro
        </button>
        <button
          class="segment-btn"
          [class.active]="especie === 'gato'"
          (click)="especie = 'gato'"
          >
          <ion-icon name="paw-outline"></ion-icon>
          Gato
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Raza (opcional)</label>
      <input type="text" class="form-input" [(ngModel)]="raza" placeholder="Ej. Mestizo" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Edad (meses, opcional)</label>
        <input type="number" class="form-input" [(ngModel)]="edadMeses" min="0" max="360" />
      </div>
      <div class="form-group">
        <label class="form-label">Peso (kg, opcional)</label>
        <input type="number" class="form-input" [(ngModel)]="pesoKg" min="0" max="150" step="0.1" />
      </div>
    </div>

    @if (error) {
      <p class="form-msg form-msg--error">{{ error }}</p>
    }
  </div>

  <div class="modal-footer">
    <button class="cancel-btn" (click)="cancel()">Cancelar</button>
    <button class="confirm-btn" (click)="confirm()">
      <ion-icon name="checkmark-outline"></ion-icon>
      <span>{{ isEditMode ? 'Guardar cambios' : 'Agregar mascota' }}</span>
    </button>
  </div>
</div>
