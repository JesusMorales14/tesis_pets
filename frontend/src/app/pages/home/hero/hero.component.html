<div class="home-wrapper">
  <!-- Titulo -->
  <h1 class="title">
    ¡Predice la <span style="color: #3b6edc">salud</span> <br />de tus mascotas
    lo antes posible!
  </h1>

  <!-- TEXTO -->
  <p class="description">
    Empodera el cuidado de tu mascota con diagnósticos de grado clínico basados
    en Machine Learning.
  </p>

  <!-- BOTONES -->
  <div class="actions">
    <button class="btn-primary" (click)="goToCheck()">Iniciar Chequeo</button>
  </div>

  <!-- CARD -->
  <div class="pet-card">
    <img src="assets/img/husky.png" alt="dog" />

    <div class="status-badge">
      <div class="icon">
        <ion-icon name="checkmark-circle-sharp"></ion-icon>
      </div>
      <div>
        <span class="label">ESTADO ACTUAL</span>
        <span class="value">Óptimo</span>
      </div>
    </div>
  </div>
</div>
